project_name: gail-ai-operating-system-rev-2
display_name: GAIL AI Operating System Rev 2
project_type: agent
use_case:
  primary: AI agent with tools
  secondary: []
  notes: Use-case classification informs controls but does not override selected risk_tier or governance_level.
risk_tier: low
governance_level: 1
repository_model: single-repo
owner:
  name: Adam Goodwin
  role: owner
technical_lead:
  name: codex session
  role: technical-lead
status: active
environments:
  - dev
  - staging
  - prod
data_classification:
  handles_sensitive_data: false
  handles_money: false
  notes: "Rev 2 starts as local governance, planning, link-only tool directory, and copied reference docs. Live M365, QuickBooks, finance, billing, client data, secrets, and account access require a later explicit boundary."
controls:
  required_docs:
    - README.md
    - START_HERE.md
    - docs/context-map.md
    - docs/source-of-truth-map.md
    - docs/architecture.md
    - docs/current-build-pathway.md
    - docs/manual.md
    - docs/roadmap.md
    - docs/policy/durable-development-engineering-policy.md
    - docs/standards/README.md
    - docs/standards/engineering-governance-by-use-case.md
    - docs/standards/ship-ready-engineering-standard.md
    - docs/deployment-guide.md
    - docs/runbook.md
    - docs/CHANGELOG.md
    - docs/risks/risk-register.md
    - docs/migration/source-inventory.md
    - docs/migration/file-migration-decisions.md
    - docs/tool-permission-matrix.md
    - docs/agent-runtime-instructions.md
    - docs/agent-inventory.md
    - docs/model-registry.md
    - docs/prompt-register.md
    - docs/graphify-handoff-checkpoint.md
  machine_enforcement:
    - required-file-check
    - lint
    - tests
    - secret-scan
exceptions: []
agent_controls:
  applicable: true
  autonomy_level: A1
  model_registry:
    - docs/model-registry.md
  prompt_registry:
    - docs/prompt-register.md
agentic_coding:
  principle: "The repository remembers. Agents rent context."
  default_budget: medium
  always_loaded_files:
    - AGENTS.md
  conditional_loaded_files:
    START_HERE.md: material work, unclear scope, handoffs, or active-plan changes
    docs/context-map.md: unclear context routing or broader task scoping
    project-control.yaml: risk, governance level, controls, or required docs
  context_limits:
    agents_md_target_kb: 6
    claude_md_target_kb: 6
    task_packet_target_words: 1200
    handoff_target_words: 900
  subagent_policy:
    max_parallel_readers: 3
    max_parallel_editors: 1
    require_summary_only: true
    no_overlapping_file_edits: true
