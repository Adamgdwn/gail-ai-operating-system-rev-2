name: Build and Push GAIL OS API

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/gail-os-api/**'
      - 'packages/uaos-core/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: acrgailcnspilot.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            acrgailcnspilot.azurecr.io/gail-os-api:latest
            acrgailcnspilot.azurecr.io/gail-os-api:${{ github.sha }}

      - name: Smoke test image
        run: |
          docker run --rm -d \
            --name gail-os-smoke \
            -e GAIL_OS_API_KEY=smoke-test-key \
            -p 8123:8123 \
            acrgailcnspilot.azurecr.io/gail-os-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8123/api/v1/health
          docker stop gail-os-smoke
